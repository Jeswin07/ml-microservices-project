apiVersion: apps/v1
kind: Deployment

metadata:
  name: gateway-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: gateway

  template:
    metadata:
      labels:
        app: gateway

    spec:
      containers:
      - name: gateway-container
        image: jeswin07/api-gateway:v2
        imagePullPolicy: Always

        ports:
        - containerPort: 8000